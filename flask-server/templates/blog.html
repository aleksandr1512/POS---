<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Просмотр</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

  <header>
    <div class="menu">
      <input type="checkbox" id="burger-checkbox" class="burger-checkbox">
      <label for="burger-checkbox" class="burger"></label>
      <ul class="menu-list">
          <li><a href="/" class="menu-item">Искать</a><li>
          <li><a href="/all" class="menu-item">Смотреть всё</a><li>
      </ul>
    </div>
    <h2 class="text">POS</h2></br>
  </header>

  <div id="posts">
  {% for post in posts %}
  <a href="{{ url_for('show_post', post_id=post[0]) }}">
    <div class="post">
      <h1 class="text">{{ post[1] }}</h3>
      <p style="margin: 20px;" class="text" >{{ post[2]  }}</p>
      <p style="margin: 20px;" class="text" >{{ post[3]  }}</p>
    </div>
  </a>
  {% endfor %}
  </div>
</body>
</html>
